<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>極簡 168 計時器</title>
<style>
  /* ================= SECTION 1: 極簡樣式與 UI 結構 ================= */
  :root {
    --bg: #121212; --text: #ffffff; 
    --primary: #4caf50; --danger: #f44336; --info: #2196f3; --border: #333;
  }
  body { 
    background: var(--bg); color: var(--text); 
    font-family: system-ui, -apple-system, sans-serif; 
    text-align: center; padding: 20px; margin: 0; 
  }
  h1 { font-size: 1.8rem; margin-bottom: 5px; }
  #timer { 
    font-size: 4rem; font-weight: bold; margin: 30px 0 5px 0; 
    font-variant-numeric: tabular-nums; 
  }
  #target-time {
    font-size: 1.2rem; color: #ffeb3b; font-weight: bold; margin-bottom: 25px; min-height: 28px;
  }
  button { 
    font-size: 1.2rem; padding: 15px 30px; border: none; 
    border-radius: 8px; cursor: pointer; color: white; 
    width: 100%; max-width: 320px; margin: 10px auto; 
    display: block; background: var(--primary); font-weight: bold;
    transition: opacity 0.2s;
  }
  button:active { opacity: 0.8; }
  #btn-stop { background: var(--danger); display: none; }
  .section { 
    margin-top: 30px; padding: 15px; border: 1px solid var(--border); 
    border-radius: 8px; max-width: 320px; margin-left: auto; margin-right: auto; 
    background: #1e1e1e;
  }
  #message { color: #aaa; min-height: 24px; margin-top: 5px; font-size: 0.9rem;}
  
  /* 雙選單輸入框排版 */
  .input-group {
    display: flex; gap: 10px; max-width: 320px; margin: 0 auto 10px auto;
  }
  input[type="date"], select { 
    padding: 10px; font-size: 1rem; border-radius: 5px; width: 100%;
    border: none; background: #333; color: white; color-scheme: dark; box-sizing: border-box;
  }
  
  ul { text-align: left; padding-left: 20px; margin: 10px 0 0 0; }
  li { margin-bottom: 5px; font-size: 0.95rem; }
  .achieved { color: #4caf50; }
  .locked { color: #888; text-decoration: line-through; }
  
  /* 歷史紀錄清單與刪除按鈕 */
  #history-container { 
    max-height: 150px; overflow-y: auto; margin-top: 15px; 
    border-top: 1px dashed var(--border); padding-top: 10px; 
  }
  .history-item { 
    display: flex; justify-content: space-between; align-items: center;
    padding: 8px 10px; border-bottom: 1px solid #2a2a2a; font-size: 0.95rem;
  }
  .delete-btn { 
    cursor: pointer; color: #aaa; font-weight: bold; padding: 5px 10px; 
    background: #333; border-radius: 4px; font-size: 0.8rem;
  }
  .delete-btn.confirming { color: var(--bg); background: #ffeb3b; }
</style>
</head>
<body>
  <h1>168 節食計時器</h1>
  <div id="message">準備好開始今天的斷食了嗎？</div>
  
  <div id="timer">16:00:00</div>
  <div id="target-time"></div>
  
  <div class="input-group" id="start-controls">
    <input type="date" id="start-date">
    <select id="custom-start-time">
      <option value="">時間 (預設現在)</option>
    </select>
  </div>
  <button id="btn-start">開始禁食</button>
  <button id="btn-stop">完成並記錄</button>

  <div class="section">
    <h3 style="margin-top:0; font-size: 1.1rem;">📊 歷史與成就</h3>
    <p style="margin: 5px 0;">總達成天數: <strong id="total-days">0</strong> 天</p>
    <p style="margin: 5px 0;">當前連續: <strong id="streak-days">0</strong> 天</p>
    <ul id="achievements"></ul>
    
    <!-- 新增：可視化歷史清單 -->
    <div id="history-container"></div>
  </div>

  <div class="section">
    <h3 style="margin-top:0; font-size: 1.1rem;">📝 忘記倒數？直接補錄</h3>
    <input type="date" id="manual-date" style="margin-bottom: 10px;">
    <button id="btn-manual" style="background: var(--info); font-size: 1rem; padding: 10px; margin: 0;">直接記錄此日達標</button>
  </div>

<script>
  // ================= SECTION 2: 核心狀態與輔助函式 =================
  const FAST_HOURS = 16;
  const FAST_MS = FAST_HOURS * 60 * 60 * 1000;
  
  const MSG_START = ["加油！16小時後見！", "喝杯水，飢餓感很快就過去了。", "保持專注，你可以的！"];
  const MSG_SUCCESS = ["太棒了！你達成了一次168！", "恭喜完成！享受你的美食吧！", "意志力驚人！繼續保持！"];
  
  // 安全的本地日期字串轉換 (YYYY-MM-DD)
  const getLocalDateStr = (d = new Date()) => {
    const y = d.getFullYear();
    const m = String(d.getMonth() + 1).padStart(2, '0');
    const day = String(d.getDate()).padStart(2, '0');
    return `${y}-${m}-${day}`;
  };

  const elTimer = document.getElementById('timer');
  const elTargetTime = document.getElementById('target-time');
  const elStartDate = document.getElementById('start-date');
  const elCustomStartTime = document.getElementById('custom-start-time');
  const elStartControls = document.getElementById('start-controls');
  const elBtnStart = document.getElementById('btn-start');
  const elBtnStop = document.getElementById('btn-stop');
  const elMessage = document.getElementById('message');
  
  const elTotalDays = document.getElementById('total-days');
  const elStreakDays = document.getElementById('streak-days');
  const elAchievements = document.getElementById('achievements');
  const elHistoryContainer = document.getElementById('history-container');
  
  const elManualDate = document.getElementById('manual-date');
  const elBtnManual = document.getElementById('btn-manual');

  // 初始化日期為今天
  const todayStr = getLocalDateStr();
  elStartDate.value = todayStr;
  elStartDate.max = todayStr;
  elManualDate.value = todayStr;
  elManualDate.max = todayStr;

  // 生成時間選項 (00:00 ~ 23:30)
  for (let h = 0; h < 24; h++) {
    for (let m of ['00', '30']) {
      const timeStr = `${String(h).padStart(2, '0')}:${m}`;
      const opt = document.createElement('option');
      opt.value = timeStr;
      opt.textContent = timeStr;
      elCustomStartTime.appendChild(opt);
    }
  }

  let startTime = parseInt(localStorage.getItem('fast_start_time')) || null;
  let historyLogs = [];
  try {
    historyLogs = JSON.parse(localStorage.getItem('history_logs')) || [];
  } catch(e) { historyLogs = []; }

  let timerInterval;
  const setMsg = (msgs) => elMessage.textContent = msgs[Math.floor(Math.random() * msgs.length)];

  // ================= SECTION 3: 渲染邏輯與事件綁定 =================
  const updateTimerDisplay = () => {
    if (!startTime) {
      elTimer.textContent = "16:00:00";
      elTargetTime.textContent = "";
      return;
    }
    
    const now = Date.now();
    const elapsed = now - startTime;
    const remaining = Math.max(0, FAST_MS - elapsed);
    
    const h = String(Math.floor(remaining / 3600000)).padStart(2, '0');
    const m = String(Math.floor((remaining % 3600000) / 60000)).padStart(2, '0');
    const s = String(Math.floor((remaining % 60000) / 1000)).padStart(2, '0');
    
    elTimer.textContent = `${h}:${m}:${s}`;
    
    // 計算目標解鎖時刻
    const targetDate = new Date(startTime + FAST_MS);
    const nowDate = new Date();
    const targetDayStart = new Date(targetDate.getFullYear(), targetDate.getMonth(), targetDate.getDate()).getTime();
    const nowDayStart = new Date(nowDate.getFullYear(), nowDate.getMonth(), nowDate.getDate()).getTime();
    
    let dayPrefix = "";
    const diffDays = Math.round((targetDayStart - nowDayStart) / (24 * 60 * 60 * 1000));
    if (diffDays === 0) dayPrefix = "今天";
    else if (diffDays === 1) dayPrefix = "明天";
    else if (diffDays === 2) dayPrefix = "後天";
    else dayPrefix = `${targetDate.getMonth()+1}/${targetDate.getDate()}`;
    
    elTargetTime.textContent = `🎯 預計解鎖：${dayPrefix} ${String(targetDate.getHours()).padStart(2, '0')}:${String(targetDate.getMinutes()).padStart(2, '0')}`;
    
    elBtnStart.style.display = 'none';
    elStartControls.style.display = 'none';
    elBtnStop.style.display = 'block';

    if (remaining === 0) {
      elBtnStop.style.background = 'var(--primary)';
      elBtnStop.textContent = '🎉 點擊完成並記錄';
    } else {
      elBtnStop.style.background = 'var(--danger)';
      elBtnStop.textContent = '提早結束 (不記錄)';
    }
  };

  const renderStats = () => {
    const uniqueDates = [...new Set(historyLogs)].sort();
    localStorage.setItem('history_logs', JSON.stringify(uniqueDates));
    
    const total = uniqueDates.length;
    elTotalDays.textContent = total;

    // 連續天數計算
    let streak = 0;
    const todayStr = getLocalDateStr();
    const yesterday = new Date();
    yesterday.setDate(yesterday.getDate() - 1);
    const yesterdayStr = getLocalDateStr(yesterday);

    let checkDate = new Date();
    if (uniqueDates.includes(todayStr)) {
      // 從今天算
    } else if (uniqueDates.includes(yesterdayStr)) {
      checkDate = yesterday;
    } else {
      checkDate = null;
    }

    if (checkDate) {
      let currentCheckStr = getLocalDateStr(checkDate);
      while (uniqueDates.includes(currentCheckStr)) {
        streak++;
        checkDate.setDate(checkDate.getDate() - 1);
        currentCheckStr = getLocalDateStr(checkDate);
      }
    }
    elStreakDays.textContent = streak;

    // 成就渲染
    const achievements = [
      { name: '首次達成', condition: total >= 1 },
      { name: '連續 3 天', condition: streak >= 3 },
      { name: '累計 7 天', condition: total >= 7 }
    ];
    elAchievements.innerHTML = achievements.map(a => 
      `<li class="${a.condition ? 'achieved' : 'locked'}">${a.condition ? '✅' : '🔒'} ${a.name}</li>`
    ).join('');

    // 渲染歷史清單與內聯刪除 (反轉陣列讓最新日期在最上面)
    elHistoryContainer.innerHTML = uniqueDates.slice().reverse().map(d => `
      <div class="history-item">
        <span>📅 ${d}</span>
        <span class="delete-btn" data-date="${d}">✖ 刪除</span>
      </div>
    `).join('');

    // 綁定內聯刪除的雙重點擊事件
    document.querySelectorAll('.delete-btn').forEach(btn => {
      let confirmTimeout;
      btn.addEventListener('click', (e) => {
        const targetDate = e.target.getAttribute('data-date');
        if (e.target.classList.contains('confirming')) {
          // 確認刪除
          clearTimeout(confirmTimeout);
          historyLogs = historyLogs.filter(log => log !== targetDate);
          renderStats();
          elMessage.textContent = `🗑️ 已移除 ${targetDate} 的紀錄。`;
        } else {
          // 第一次點擊，進入確認狀態
          e.target.classList.add('confirming');
          e.target.textContent = '⚠️ 確認?';
          confirmTimeout = setTimeout(() => {
            if (e.target) {
              e.target.classList.remove('confirming');
              e.target.textContent = '✖ 刪除';
            }
          }, 3000);
        }
      });
    });
  };

  const recordSuccess = (dateStr) => {
    if (!historyLogs.includes(dateStr)) {
      historyLogs.push(dateStr);
      renderStats();
      setMsg(MSG_SUCCESS);
      elMessage.textContent = `✅ 成功記錄：${dateStr}！`;
    } else {
      elMessage.textContent = `⚠️ ${dateStr} 已經記錄過囉！`;
    }
  };

  // 開始禁食 (整合日期與時間)
  elBtnStart.addEventListener('click', () => {
    const dVal = elStartDate.value;
    const tVal = elCustomStartTime.value;
    
    if (!dVal) {
        elMessage.textContent = "日期格式錯誤，將以當下時間開始。";
        startTime = Date.now();
    } else {
        // 安全解析 YYYY-MM-DD 確保不被時區干擾
        const [y, m, d] = dVal.split('-').map(Number);
        const selectedDate = new Date(y, m - 1, d);
        
        if (tVal) {
            const [hours, minutes] = tVal.split(':').map(Number);
            selectedDate.setHours(hours, minutes, 0, 0);
        } else {
            selectedDate.setHours(new Date().getHours(), new Date().getMinutes(), 0, 0);
        }
        
        startTime = selectedDate.getTime();
        // 防呆：如果組合起來的時間大於現在，強制退回現在
        if (startTime > Date.now()) {
            startTime = Date.now();
        }
    }
    
    localStorage.setItem('fast_start_time', startTime);
    setMsg(MSG_START);
    updateTimerDisplay();
    timerInterval = setInterval(updateTimerDisplay, 1000);
  });

  elBtnStop.addEventListener('click', () => {
    const elapsed = Date.now() - startTime;
    if (elapsed < FAST_MS) {
      if(!confirm("16 小時尚未結束，確定要提早放棄嗎？(此次將不計入成功)")) return;
      elMessage.textContent = "沒關係，下次再接再厲！";
    } else {
      recordSuccess(getLocalDateStr());
    }
    
    startTime = null;
    localStorage.removeItem('fast_start_time');
    clearInterval(timerInterval);
    
    elTimer.textContent = "16:00:00";
    elTargetTime.textContent = "";
    elBtnStart.style.display = 'block';
    elStartControls.style.display = 'flex';
    elCustomStartTime.value = ''; // 恢復預設
    elBtnStop.style.display = 'none';
  });

  elBtnManual.addEventListener('click', () => {
    const d = elManualDate.value;
    if (!d) return elMessage.textContent = "請先選擇日期！";
    recordSuccess(d);
  });

  // 啟動
  renderStats();
  if (startTime) {
    updateTimerDisplay();
    timerInterval = setInterval(updateTimerDisplay, 1000);
  }
</script>
</body>
</html>
